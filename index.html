<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-2xl bg-slate-800 rounded-xl shadow-2xl p-6 mt-10">
        <h1 class="text-2xl font-bold mb-4 text-cyan-400">✨ AI Assistant Pro (Gemini)</h1>
        
        <div id="chat-box" class="h-96 overflow-y-auto mb-4 p-4 bg-slate-900 rounded-lg space-y-4">
            <div class="text-gray-400 text-sm">Hệ thống sẵn sàng. Nhập tin nhắn bên dưới...</div>
        </div>

        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-1 bg-slate-700 border-none rounded-lg p-3 focus:ring-2 focus:ring-cyan-500 outline-none" placeholder="Hỏi tôi bất cứ điều gì...">
            <button onclick="sendMessage()" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-3 rounded-lg font-bold transition">Gửi</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const userMsg = input.value;
            chatBox.innerHTML += `<div class="text-right"><span class="bg-cyan-700 px-3 py-2 rounded-lg inline-block">${userMsg}</span></div>`;
            input.value = '';

            try {
                const response = await fetch('/api/claude', { // Vẫn giữ đường dẫn này để khớp với file cũ
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userMsg })
                });
                const data = await response.json();
                chatBox.innerHTML += `<div class="text-left"><span class="bg-slate-700 px-3 py-2 rounded-lg inline-block text-cyan-300">AI: ${data.reply}</span></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<div class="text-red-400">Lỗi kết nối rồi bạn ơi!</div>`;
            }
        }
    </script>
</body>
</html>
